<nav aria-label="Progress" class="w-full px-4 py-8">
  <ol role="list" class="flex items-center w-full">
    @for(step of steps; track $index; let i = $index){
    <li [class]="getStepClasses(step, i)">

      @if(i !== steps.length - 1){
      <div class="absolute left-0 top-5 w-full h-0.5 bg-slate-100" aria-hidden="true">
        <div class="h-full transition-all duration-500"
          [ngClass]="step.state === 'completed' ? activeColor : 'bg-transparent'"
          [style.width]="step.state === 'completed' ? '100%' : '0%'">
        </div>
      </div>
      }

      <div class="relative flex flex-col items-center group" [class.cursor-pointer]="!step.disabled"
        (click)="onStepClick(step)">

        <span
          class="flex h-10 w-10 items-center justify-center rounded-full border-2 transition-all duration-300 shadow-sm"
          [ngClass]="{
                'bg-white border-slate-200 text-slate-400': step.state === 'pending',
                'bg-white border-indigo-600 text-indigo-600 ring-4 ring-indigo-50 animate-pulse': step.state === 'active',
                'bg-white border-indigo-600 text-indigo-600 ring-indigo-600': step.state === 'completed',
                'bg-white border-indigo-600 text-indigo-600 ring-2 ring-indigo-300': step.current
              }">

          <lucide-icon [name]="step.icon" [size]="18"></lucide-icon>
        </span>

        <div class="absolute top-12 flex flex-col items-center min-w-[120px]">
          <span class="text-xs font-bold uppercase tracking-wider transition-colors"
            [ngClass]="step.state === 'active' ? 'text-indigo-600' : 'text-slate-500'">
            {{ step.label }}
          </span>
          @if(step.description && step.state !== 'pending'){
          <span class="text-[10px] text-slate-400 font-medium truncate max-w-[100px]">
            {{ step.description }}
          </span>
          }
        </div>
      </div>
    </li>
    }
  </ol>
</nav>
