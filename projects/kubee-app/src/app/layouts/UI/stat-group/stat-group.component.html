<div class="w-full bg-ez-white border-y border-ez-border">
  <div [ngClass]="gridClass" class="grid divide-y sm:divide-y-0 sm:divide-x divide-ez-border">

    @for(stat of stats; track stat.key) {
    <div class="group relative px-6 py-5 hover:bg-ez-ash transition-colors duration-ez flex items-center gap-4">

      <div
        class="shrink-0 w-11 h-11 rounded border border-ez-border bg-ez-white text-ez-heading flex items-center justify-center transition-colors duration-ez group-hover:border-ez-subtle">
        <lucide-icon [img]="stat.icon" class="w-5 h-5" [strokeWidth]="1.5"></lucide-icon>
      </div>

      <div class="flex flex-col min-w-0 flex-1">
        <p class="text-ez-secondary mb-1">
          {{ stat.label }}
        </p>

        <div class="flex items-baseline gap-3">
          <h3 class="font-medium text-ez-heading leading-none tracking-normal">
            {{ stat.value }}
          </h3>

          @if(stat.trend) {
          <div class="flex items-center gap-1">
            @if(stat.trend.isNeutral) {
            <lucide-icon [img]="neutralIcon" class="w-3.5 h-3.5 text-ez-muted"></lucide-icon>
            } @else if(stat.trend.isUp) {
            <lucide-icon [img]="trendingUpIcon" class="w-3.5 h-3.5 text-ez-secondary"></lucide-icon>
            } @else {
            <lucide-icon [img]="trendingDownIcon" class="w-3.5 h-3.5 text-ez-secondary"></lucide-icon>
            }
            <span class="text-ez-xs font-medium text-ez-secondary">
              {{ stat.trend.value }}
            </span>
          </div>
          }
        </div>
      </div>

    </div>
    }

  </div>
</div>
