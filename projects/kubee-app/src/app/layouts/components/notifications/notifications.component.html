<el-dropdown class="inline-block">

  <button title="Notifications"
    class="relative flex items-center justify-center w-8 h-8 bg-ez-white border border-ez-border rounded hover:border-ez-subtle text-ez-secondary hover:text-ez-heading transition-[border-color,color] duration-ez outline-none">
    <lucide-icon [img]="BellIcon" class="w-4 h-4 shrink-0"></lucide-icon>

    <span *ngIf="unreadCount() > 0" class="absolute -top-1 -right-1 flex h-2 w-2 pointer-events-none">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
    </span>
  </button>

  <el-menu [attr.anchor]="'bottom end'" popover
    class="m-2 w-80 origin-top-right bg-ez-white border border-ez-ash rounded shadow-lg p-0">

    <div class="flex items-center justify-between py-4 px-4 border-b border-ez-border bg-white shrink-0">
      <div class="flex items-center gap-2.5">
        <lucide-icon [img]="BellIcon" class="w-4 h-4 text-ez-heading"></lucide-icon>
        <span class="text-ez-heading font-medium text-ez-base">Notifications</span>
      </div>
      <span *ngIf="unreadCount() > 0" class="text-ez-xs font-medium text-ez-secondary">
        {{ unreadCount() }} new
      </span>
    </div>

    <div class="flex flex-col overflow-hidden" style="max-height: 480px;">

      <div class="px-4 border-b border-ez-border bg-ez-ash shrink-0">
        <div class="flex items-center justify-between py-2">

          <div class="flex gap-4">
            <button (click)="filter.set('all')"
              class="text-ez-sm transition-colors duration-ez outline-none pb-1 border-b-2"
              [ngClass]="filter() === 'all' ? 'text-ez-heading font-medium border-ez-heading' : 'text-ez-secondary border-transparent hover:text-ez-heading'">
              All
            </button>
            <button (click)="filter.set('unread')"
              class="text-ez-sm transition-colors duration-ez outline-none pb-1 border-b-2 flex items-center gap-1.5"
              [ngClass]="filter() === 'unread' ? 'text-ez-heading font-medium border-ez-heading' : 'text-ez-secondary border-transparent hover:text-ez-heading'">
              Unread
              <span *ngIf="unreadCount() > 0" class="w-1.5 h-1.5 bg-ez-primary rounded-full"></span>
            </button>
          </div>

          <div class="flex items-center gap-2">
            <button (click)="markAllAsRead()" title="Mark all as read"
              class="text-ez-secondary hover:text-ez-primary transition-colors duration-ez outline-none">
              <lucide-icon [img]="CheckIcon" class="w-4 h-4"></lucide-icon>
            </button>
            <button (click)="clearAll()" title="Clear all"
              class="text-ez-secondary hover:text-ez-heading transition-colors duration-ez outline-none">
              <lucide-icon [img]="TrashIcon" class="w-4 h-4"></lucide-icon>
            </button>
          </div>

        </div>
      </div>

      <div class="overflow-y-auto bg-white">

        <div *ngIf="notifications().length === 0"
          class="flex flex-col items-center justify-center py-16 px-6 text-center border-b border-ez-border">
          <div class="w-10 h-10 border border-ez-border bg-ez-ash flex items-center justify-center mb-4">
            <lucide-icon [img]="BellIcon" class="w-5 h-5 text-ez-muted"></lucide-icon>
          </div>
          <h3 class="text-ez-sm font-medium text-ez-heading">All caught up</h3>
          <p class="text-ez-xs text-ez-secondary mt-1">No new notifications.</p>
        </div>

        <ng-container *ngFor="let note of notifications()">
          <div (click)="markAsRead(note)"
            class="relative group flex items-start gap-4 p-4 border-b border-ez-border last:border-0 hover:bg-ez-ash cursor-pointer transition-colors duration-ez outline-none">

            <div class="shrink-0 mt-0.5" [ngClass]="{
                'text-amber-500': note.type === 'WARNING',
                'text-ez-primary': note.type === 'SUCCESS',
                'text-red-500': note.type === 'ERROR',
                'text-ez-secondary': note.type === 'INFO' || !note.type
              }">
              <lucide-icon *ngIf="note.type === 'WARNING'" [img]="AlertIcon" class="w-4 h-4"></lucide-icon>
              <lucide-icon *ngIf="note.type === 'SUCCESS'" [img]="CheckIcon" class="w-4 h-4"></lucide-icon>
              <lucide-icon *ngIf="note.type === 'ERROR'" [img]="ErrorIcon" class="w-4 h-4"></lucide-icon>
              <lucide-icon *ngIf="note.type === 'INFO' || !note.type" [img]="InfoIcon" class="w-4 h-4"></lucide-icon>
            </div>

            <div class="flex-1 min-w-0">

              <div class="flex justify-between items-start mb-1">
                <h4 class="text-ez-sm font-medium truncate pr-4"
                  [ngClass]="note.isRead ? 'text-ez-secondary' : 'text-ez-heading'">
                  {{ note.subject }}
                </h4>
                <span class="text-ez-xs text-ez-muted whitespace-nowrap shrink-0">
                  {{ note.receivedAt | date:'shortTime' }}
                </span>
              </div>

              <p class="text-ez-xs text-ez-secondary leading-relaxed line-clamp-2">{{ note.body }}</p>

              <div class="mt-2">
                <ng-container *ngTemplateOutlet="channelBadgeTpl; context: { $implicit: note }"></ng-container>
              </div>

            </div>

            <div *ngIf="!note.isRead" class="absolute top-4 right-4 w-1.5 h-1.5 bg-ez-primary rounded-full"></div>

          </div>
        </ng-container>

      </div>
    </div>
  </el-menu>
</el-dropdown>

<ng-template #channelBadgeTpl let-note>
  <span *ngIf="note.channel === 'IN_APP'"
    class="inline-flex items-center gap-1.5 px-1.5 py-0.5 border border-ez-border bg-white text-ez-xs font-medium text-ez-secondary">
    <lucide-icon [img]="InAppIcon" class="w-3 h-3 text-ez-muted"></lucide-icon>
    In-App
  </span>
  <span *ngIf="note.channel === 'EMAIL'"
    class="inline-flex items-center gap-1.5 px-1.5 py-0.5 border border-ez-border bg-white text-ez-xs font-medium text-ez-secondary">
    <lucide-icon [img]="MailIcon" class="w-3 h-3 text-ez-muted"></lucide-icon>
    Email
  </span>
  <span *ngIf="note.channel === 'WHATSAPP'"
    class="inline-flex items-center gap-1.5 px-1.5 py-0.5 border border-ez-border bg-white text-ez-xs font-medium text-ez-secondary">
    <lucide-icon [img]="WhatsAppIcon" class="w-3 h-3 text-ez-muted"></lucide-icon>
    WhatsApp
  </span>
  <span *ngIf="note.channel === 'PUSH'"
    class="inline-flex items-center gap-1.5 px-1.5 py-0.5 border border-ez-border bg-white text-ez-xs font-medium text-ez-secondary">
    <lucide-icon [img]="PushIcon" class="w-3 h-3 text-ez-muted"></lucide-icon>
    Push
  </span>
</ng-template>
